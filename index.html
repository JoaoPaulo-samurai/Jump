<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Nave</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🎮 MENU INICIAL (APENAS UM!) -->
<div id="startScreen">
  <div class="menu-box">
    <h1>🚀 Space Hunt</h1>
    <p>Colete todas as estrelas para ganhar!!</p>
    <button id="startBtn">Começar</button>
  </div>
</div>

<!-- 🎯 HUD -->
<div id="hud">
  <h1>Estrelas: <span id="contador">0</span></h1>
</div>

<!-- 🎵 MÚSICA -->
<audio id="bgm" src="bmg.mp3" loop></audio>

<!-- 🎮 JOGO -->
<div id="game">
  <div id="player"></div>
</div>

<!-- 🎮 JOYSTICK -->
<div id="joystick">
  <div id="stick"></div>
</div>

<!-- 😱 JUMPSCARE -->
<div id="jumpscare">
  <img src="scary.png">
  <audio id="som" src="scary.mp3"></audio>
</div>

<script src="script.js"></script>
</body>
</html>
